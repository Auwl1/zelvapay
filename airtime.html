<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Airtime — ZelvaPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/zelvapay/css/main.css" />
  <style>
    .network-btn { display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.2s;font-size:13px;font-weight:600;color:var(--text2);min-width:90px; }
    .network-btn:hover { border-color:var(--border2);color:var(--text); }
    .network-btn.active-network { border-color:var(--accent);color:var(--text);background:rgba(108,99,255,0.08); }
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><a href="/zelvapay/index.html" class="nav-logo" style="font-family:var(--font-display);font-size:20px;font-weight:800;">Zelva<span style="color:var(--accent)">Pay</span></a></div>
    <nav class="sidebar-nav">
      <a href="/zelvapay/pages/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="/zelvapay/pages/data.html"><span class="nav-icon">📶</span> Buy Data</a>
      <a href="/zelvapay/pages/airtime.html" class="active"><span class="nav-icon">📱</span> Buy Airtime</a>
      <a href="/zelvapay/pages/electricity.html"><span class="nav-icon">⚡</span> Electricity</a>
      <a href="/zelvapay/pages/cable.html"><span class="nav-icon">📺</span> Cable TV</a>
      <a href="/zelvapay/pages/virtual-card.html"><span class="nav-icon">💳</span> Virtual Cards</a>
      <a href="/zelvapay/pages/giftcard.html"><span class="nav-icon">🎁</span> Gift Cards</a>
      <a href="/zelvapay/pages/transfer.html"><span class="nav-icon">🏦</span> Transfer</a>
      <a href="/zelvapay/pages/transactions.html"><span class="nav-icon">📋</span> Transactions</a>
      <a href="/zelvapay/pages/api-settings.html"><span class="nav-icon">🔑</span> API Settings</a>
    </nav>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar">MA</div><div><div class="user-name">Muhammad Auwal</div></div></div></div>
  </aside>
  <main class="main-content">
    <div style="max-width:520px">
      <div class="page-header"><div><h1 class="page-title">Buy Airtime</h1><p class="page-sub">Balance: <strong style="color:var(--green)">₦45,820.00</strong> · 2% cashback on every recharge</p></div></div>
      <div class="section-card">
        <div style="padding:28px">
          <form onsubmit="submitForm(event,'Airtime purchased successfully! 📱')">
            <div class="form-group">
              <label class="form-label">Network</label>
              <div style="display:flex;gap:10px;flex-wrap:wrap">
                <button type="button" class="network-btn active-network" onclick="selectNetwork(this,'MTN')"><span style="font-size:28px">🟡</span>MTN</button>
                <button type="button" class="network-btn" onclick="selectNetwork(this,'Airtel')"><span style="font-size:28px">🔴</span>Airtel</button>
                <button type="button" class="network-btn" onclick="selectNetwork(this,'Glo')"><span style="font-size:28px">🟢</span>Glo</button>
                <button type="button" class="network-btn" onclick="selectNetwork(this,'9Mobile')"><span style="font-size:28px">🟤</span>9Mobile</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input class="form-input" type="tel" placeholder="080XXXXXXXXX" maxlength="11" required />
            </div>
            <div class="form-group">
              <label class="form-label">Amount (₦)</label>
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
                <button type="button" class="btn-outline" style="padding:10px;font-size:13px" onclick="setAmt(100)">₦100</button>
                <button type="button" class="btn-outline" style="padding:10px;font-size:13px" onclick="setAmt(200)">₦200</button>
                <button type="button" class="btn-outline" style="padding:10px;font-size:13px" onclick="setAmt(500)">₦500</button>
                <button type="button" class="btn-outline" style="padding:10px;font-size:13px" onclick="setAmt(1000)">₦1,000</button>
              </div>
              <div class="input-group"><span class="input-prefix">₦</span><input class="form-input" type="number" id="airtime-amt" placeholder="Enter amount" min="50" required /></div>
            </div>
            <div class="form-group">
              <label class="form-label" style="display:flex;justify-content:space-between">Airtime-to-Cash <span style="color:var(--green);font-size:12px">+2% cashback</span></label>
              <label style="display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);cursor:pointer">
                <input type="checkbox" style="accent-color:var(--accent)"> Convert airtime to wallet cash instead
              </label>
            </div>
            <button type="submit" class="btn-primary btn-full" style="padding:16px;margin-top:8px">Buy Airtime</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/zelvapay/js/main.js"></script>
<script>
function setAmt(v) { document.getElementById('airtime-amt').value = v; }
</script>
</body>
</html>
