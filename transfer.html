<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transfer — ZelvaPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/zelvapay/css/main.css" />
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><a href="/zelvapay/index.html" class="nav-logo" style="font-family:var(--font-display);font-size:20px;font-weight:800;">Zelva<span style="color:var(--accent)">Pay</span></a></div>
    <nav class="sidebar-nav">
      <a href="/zelvapay/pages/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="/zelvapay/pages/data.html"><span class="nav-icon">📶</span> Buy Data</a>
      <a href="/zelvapay/pages/airtime.html"><span class="nav-icon">📱</span> Buy Airtime</a>
      <a href="/zelvapay/pages/electricity.html"><span class="nav-icon">⚡</span> Electricity</a>
      <a href="/zelvapay/pages/cable.html"><span class="nav-icon">📺</span> Cable TV</a>
      <a href="/zelvapay/pages/virtual-card.html"><span class="nav-icon">💳</span> Virtual Cards</a>
      <a href="/zelvapay/pages/giftcard.html"><span class="nav-icon">🎁</span> Gift Cards</a>
      <a href="/zelvapay/pages/transfer.html" class="active"><span class="nav-icon">🏦</span> Transfer</a>
      <a href="/zelvapay/pages/transactions.html"><span class="nav-icon">📋</span> Transactions</a>
      <a href="/zelvapay/pages/api-settings.html"><span class="nav-icon">🔑</span> API Settings</a>
    </nav>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar">MA</div><div><div class="user-name">Muhammad Auwal</div></div></div></div>
  </aside>
  <main class="main-content">
    <div style="max-width:520px">
      <div class="page-header"><div><h1 class="page-title">Bank Transfer</h1><p class="page-sub">Send money to any Nigerian bank. ₦20 flat fee.</p></div></div>
      <div class="section-card">
        <div style="padding:28px">
          <form onsubmit="handleTransfer(event)">
            <div class="form-group">
              <label class="form-label">Bank</label>
              <select class="form-select" required>
                <option value="">Select Bank</option>
                <option>Access Bank</option><option>GTBank</option><option>First Bank</option>
                <option>UBA</option><option>Zenith Bank</option><option>Wema Bank</option>
                <option>Kuda Bank</option><option>Opay</option><option>Palmpay</option>
                <option>Moniepoint</option><option>Fidelity Bank</option><option>FCMB</option>
                <option>Stanbic IBTC</option><option>Sterling Bank</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Account Number</label>
              <div style="display:flex;gap:8px">
                <input class="form-input" type="text" id="acc-no" placeholder="0123456789" maxlength="10" required style="flex:1" />
                <button type="button" class="btn-outline" style="padding:10px 16px;white-space:nowrap" onclick="verifyAccount()">Verify</button>
              </div>
            </div>
            <div id="acc-name-box" style="display:none;background:rgba(34,211,165,0.05);border:1px solid rgba(34,211,165,0.2);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px">
              <div style="font-size:12px;color:var(--text3);margin-bottom:4px">Account Name</div>
              <div style="font-size:16px;font-weight:700;color:var(--green)" id="acc-name-display">AUWAL MUHAMMAD HAMEED</div>
            </div>
            <div class="form-group">
              <label class="form-label">Amount (₦)</label>
              <div class="input-group"><span class="input-prefix">₦</span><input class="form-input" type="number" id="transfer-amt" placeholder="Enter amount" min="100" required /></div>
              <p class="form-hint">Fee: ₦20 · Balance: ₦45,820.00</p>
            </div>
            <div class="form-group">
              <label class="form-label">Narration <span style="color:var(--text3)">(Optional)</span></label>
              <input class="form-input" type="text" placeholder="e.g. Payment for goods" />
            </div>
            <button type="submit" class="btn-primary btn-full" style="padding:16px;margin-top:8px">Send Money</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/zelvapay/js/main.js"></script>
<script>
function verifyAccount() {
  const acc = document.getElementById('acc-no').value;
  if (acc.length < 10) { showToast('Enter a valid 10-digit account number', 'error'); return; }
  showToast('Account verified ✓', 'success');
  document.getElementById('acc-name-box').style.display = 'block';
}
function handleTransfer(e) {
  e.preventDefault();
  const btn = e.target.querySelector('[type="submit"]');
  btn.textContent = 'Sending...'; btn.disabled = true;
  setTimeout(() => {
    btn.textContent = 'Send Money'; btn.disabled = false;
    showToast('Transfer of ₦' + Number(document.getElementById('transfer-amt').value).toLocaleString() + ' sent successfully! 🏦', 'success');
  }, 2000);
}
</script>
</body>
</html>
