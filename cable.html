<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cable TV — ZelvaPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/zelvapay/css/main.css" />
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><a href="/zelvapay/index.html" class="nav-logo" style="font-family:var(--font-display);font-size:20px;font-weight:800;">Zelva<span style="color:var(--accent)">Pay</span></a></div>
    <nav class="sidebar-nav">
      <a href="/zelvapay/pages/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="/zelvapay/pages/data.html"><span class="nav-icon">📶</span> Buy Data</a>
      <a href="/zelvapay/pages/airtime.html"><span class="nav-icon">📱</span> Buy Airtime</a>
      <a href="/zelvapay/pages/electricity.html"><span class="nav-icon">⚡</span> Electricity</a>
      <a href="/zelvapay/pages/cable.html" class="active"><span class="nav-icon">📺</span> Cable TV</a>
      <a href="/zelvapay/pages/virtual-card.html"><span class="nav-icon">💳</span> Virtual Cards</a>
      <a href="/zelvapay/pages/giftcard.html"><span class="nav-icon">🎁</span> Gift Cards</a>
      <a href="/zelvapay/pages/transfer.html"><span class="nav-icon">🏦</span> Transfer</a>
      <a href="/zelvapay/pages/transactions.html"><span class="nav-icon">📋</span> Transactions</a>
      <a href="/zelvapay/pages/api-settings.html"><span class="nav-icon">🔑</span> API Settings</a>
    </nav>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar">MA</div><div><div class="user-name">Muhammad Auwal</div></div></div></div>
  </aside>
  <main class="main-content">
    <div style="max-width:520px">
      <div class="page-header"><div><h1 class="page-title">Cable TV</h1><p class="page-sub">Renew DSTv, GOtv, and Startimes subscriptions.</p></div></div>
      <div class="section-card">
        <div style="padding:28px">
          <form onsubmit="submitForm(event,'Cable TV subscription renewed! 📺')">
            <div class="form-group">
              <label class="form-label">Cable Provider</label>
              <div style="display:flex;gap:10px;flex-wrap:wrap">
                <button type="button" class="network-btn active-network" onclick="selectCable(this,'dstv')"><span style="font-size:28px">📡</span>DSTv</button>
                <button type="button" class="network-btn" onclick="selectCable(this,'gotv')"><span style="font-size:28px">📺</span>GOtv</button>
                <button type="button" class="network-btn" onclick="selectCable(this,'startimes')"><span style="font-size:28px">⭐</span>Startimes</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">IUC / Smartcard Number</label>
              <input class="form-input" type="text" placeholder="e.g. 1234567890" required />
            </div>
            <div class="form-group">
              <label class="form-label">Bouquet / Package</label>
              <select class="form-select" id="cable-plan">
                <option value="">Select package</option>
                <option value="padi" data-price="2150">DSTv Padi — ₦2,150/mo</option>
                <option value="yanga" data-price="2950">DSTv Yanga — ₦2,950/mo</option>
                <option value="confam" data-price="6200">DSTv Confam — ₦6,200/mo</option>
                <option value="compact" data-price="10500">DSTv Compact — ₦10,500/mo</option>
                <option value="compact-plus" data-price="16600">DSTv Compact+ — ₦16,600/mo</option>
                <option value="premium" data-price="29500">DSTv Premium — ₦29,500/mo</option>
              </select>
            </div>
            <button type="submit" class="btn-primary btn-full" style="padding:16px;margin-top:8px">Renew Subscription</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/zelvapay/js/main.js"></script>
<script>
function selectCable(btn, provider) {
  document.querySelectorAll('.network-btn').forEach(b => b.classList.remove('active-network'));
  btn.classList.add('active-network');
  const plans = {
    dstv: ['<option value="">Select package</option>','<option value="padi" data-price="2150">DSTv Padi — ₦2,150/mo</option>','<option value="compact" data-price="10500">DSTv Compact — ₦10,500/mo</option>','<option value="premium" data-price="29500">DSTv Premium — ₦29,500/mo</option>'],
    gotv: ['<option value="">Select package</option>','<option value="supa" data-price="6400">GOtv Supa — ₦6,400/mo</option>','<option value="max" data-price="4850">GOtv Max — ₦4,850/mo</option>','<option value="jolli" data-price="3300">GOtv Jolli — ₦3,300/mo</option>'],
    startimes: ['<option value="">Select package</option>','<option value="nova" data-price="1900">Nova — ₦1,900/mo</option>','<option value="basic" data-price="2800">Basic — ₦2,800/mo</option>','<option value="smart" data-price="3800">Smart — ₦3,800/mo</option>'],
  };
  document.getElementById('cable-plan').innerHTML = (plans[provider]||[]).join('');
}
// Add network-btn style inline for cable
document.querySelectorAll('.network-btn').forEach(b => {
  b.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border-radius:10px;border:2px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.2s;font-size:13px;font-weight:600;color:var(--text2);min-width:90px;';
});
</script>
<style>.network-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.2s;font-size:13px;font-weight:600;color:var(--text2);min-width:90px}.network-btn.active-network{border-color:var(--accent);color:var(--text);background:rgba(108,99,255,0.08)}</style>
</body>
</html>
